<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Extension</title>
    <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
    <div class="container">
        <h1>Hello World! 👋</h1>
        <p>Welcome to your Chromium extension.</p>
        
        <div class="content">
            <p id="message">Click the button below to see a message:</p>
            <button id="greetButton">Show Greeting</button>
        </div>
        
        <div class="info">
            <p>Current URL: <span id="currentUrl">Loading...</span></p>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
